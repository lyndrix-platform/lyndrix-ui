# Lyndrix React UI — static SPA + reverse proxy to the core API.
#
# The SPA calls the backend same-origin (BASE_URL === '' in src/lib/api.ts and
# EventSource('/api/events') in src/lib/useSSE.ts), so we proxy /api/ to the core
# service. /api/events (and the iac job-log stream) are Server-Sent-Events: proxy
# buffering must be OFF and the read timeout long, otherwise live notifications and
# log streaming stall.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Combined with the variable in proxy_pass below this
    # makes nginx resolve the core at REQUEST time, not at startup — so the UI
    # container boots even if core isn't up/resolvable yet (no hard ordering), and
    # it re-resolves if the core container's IP changes on restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Hashed, immutable build assets — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API + SSE -> core (same-origin from the browser's perspective).
    location /api/ {
        # Variable forces runtime DNS resolution (avoids startup failure when the
        # core container isn't resolvable yet). No URI part => full request URI is
        # forwarded unchanged (/api/... -> core /api/...).
        set $core_upstream "http://aac-lyndrix-core:8081";
        proxy_pass $core_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events / streaming: keep the connection open, no buffering.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # SPA client-side routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
