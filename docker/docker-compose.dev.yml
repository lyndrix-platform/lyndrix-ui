services:
  lyndrix-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lyndrix-ui-dev
    ports:
      - "5173:5173"
    volumes:
      # Source files are mounted so edits on the host trigger instant hot reload.
      # node_modules is NOT mounted — the image's installed version is used.
      - ../src:/app/src
      - ../public:/app/public
      - ../index.html:/app/index.html
      - ../vite.config.ts:/app/vite.config.ts
      - ../tailwind.config.js:/app/tailwind.config.js
      - ../postcss.config.js:/app/postcss.config.js
      - ../tsconfig.json:/app/tsconfig.json
      - ../tsconfig.app.json:/app/tsconfig.app.json
    env_file:
      - .env.dev
    # Exposes the host as host.docker.internal — used by the API proxy to reach
    # lyndrix-core running on the host (or in its own compose stack).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Proxy /api requests to lyndrix-core on the host.
      - API_PROXY_TARGET=http://10.1.10.137:8081
      # Plugin UI links open lyndrix-core pages in a new tab.
      - VITE_CORE_URL=http://10.1.10.137:8081
      # Polling is required for inotify to work reliably in WSL2 volume mounts.
      - CHOKIDAR_USEPOLLING=true
    networks:
      - default
      - secured
    labels:
      traefik.enable: "true"
      traefik.http.routers.lyndrix-ui-dev.rule: "Host(`ui.dev.int.fam-feser.de`)"
      traefik.http.routers.lyndrix-ui-dev.entrypoints: "websecure"
      traefik.http.routers.lyndrix-ui-dev.tls: "true"
      traefik.http.routers.lyndrix-ui-dev.tls.certresolver: "ionos"
      traefik.docker.network: "dev-secured"
      traefik.http.services.lyndrix-ui-dev.loadbalancer.server.port: "5173"
      traefik.http.services.lyndrix-ui-dev.loadbalancer.server.scheme: "http"

networks:
  default: {}
  secured:
    name: "dev-secured"
    external: true
