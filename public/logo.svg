<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <linearGradient id="lyndrixGradPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" /> <!-- Blue-500 -->
            <stop offset="100%" stop-color="#10b981" /> <!-- Emerald-500 -->
        </linearGradient>
        <linearGradient id="lyndrixGradSecondary" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2563eb" /> <!-- Blue-600 -->
            <stop offset="100%" stop-color="#059669" /> <!-- Emerald-600 -->
        </linearGradient>
        <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Outer Shield / Vault perimeter -->
    <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" fill="none" stroke="url(#lyndrixGradPrimary)" stroke-width="3" filter="url(#neonGlow)"/>
    
    <!-- Inner Hexagon (Core Framework) -->
    <polygon points="50,20 76,35 76,65 50,80 24,65 24,35" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 2"/>

    <!-- Core Node (The Engine) -->
    <polygon points="50,30 67.5,40 67.5,60 50,70 32.5,60 32.5,40" fill="url(#lyndrixGradSecondary)" opacity="0.9"/>
    
    <!-- Center Data Point -->
    <circle cx="50" cy="50" r="6" fill="#0b1120" />
    <circle cx="50" cy="50" r="2.5" fill="#ffffff" filter="url(#neonGlow)"/>

    <!-- Plugin / Connection Nodes -->
    <circle cx="50" cy="5" r="3" fill="#ffffff" />
    <circle cx="90" cy="27.5" r="3" fill="#ffffff" />
    <circle cx="90" cy="72.5" r="3" fill="#ffffff" />
    <circle cx="50" cy="95" r="3" fill="#ffffff" />
    <circle cx="10" cy="72.5" r="3" fill="#ffffff" />
    <circle cx="10" cy="27.5" r="3" fill="#ffffff" />

    <!-- Network Routing Lines (connecting core to outer shield) -->
    <line x1="50" y1="30" x2="50" y2="5" stroke="url(#lyndrixGradPrimary)" stroke-width="1.5"/>
    <line x1="67.5" y1="60" x2="90" y2="72.5" stroke="url(#lyndrixGradPrimary)" stroke-width="1.5"/>
    <line x1="32.5" y1="60" x2="10" y2="72.5" stroke="url(#lyndrixGradPrimary)" stroke-width="1.5"/>
</svg>